<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${section.title} + ' - Tasks'">Section Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal h-screen flex flex-col">

<div class="bg-white shadow-sm p-6 mb-6">
    <div class="container mx-auto max-w-3xl flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-800" th:text="${section.title}">Section Title</h1>
        </div>

        <a th:href="@{/api/dashboard/project/{id}(id=${section.projectId})}" class="text-blue-600 hover:text-blue-800 font-semibold bg-blue-50 py-2 px-4 rounded transition duration-200">
            &larr; Back to Project
        </a>
    </div>
</div>

<div class="container mx-auto max-w-3xl px-6 pb-8">

    <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-bold text-gray-700 mb-4 border-b pb-2">Tasks</h2>

        <div class="space-y-4 mb-6">

            <div th:each="task : ${section.tasks}" class="flex items-start justify-between gap-4 p-3 hover:bg-gray-50 rounded border border-gray-100 transition-colors">

                <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="POST" class="mt-1">
                    <button type="submit" class="focus:outline-none">
                        <span th:if="${task.completed}" class="text-green-500 text-2xl hover:text-green-600">✅</span>
                        <span th:unless="${task.completed}" class="text-gray-300 text-2xl hover:text-gray-400">⬜</span>
                    </button>
                </form>

                <div class="flex-grow">
                    <p class="text-gray-800 font-bold text-lg"
                       th:text="${task.title}"
                       th:classappend="${task.completed} ? 'line-through text-gray-400' : ''">
                        Task Title
                    </p>
                    <p class="text-gray-500 mt-1" th:text="${task.description}">Task Description</p>
                </div>

                <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="POST" onsubmit="return confirm('Delete this task?');">
                    <button type="submit" class="text-red-500 hover:text-red-700 p-2 bg-red-50 rounded font-semibold text-sm">
                        Delete
                    </button>
                </form>
            </div>

            <div th:if="${section.tasks == null or section.tasks.empty}" class="text-center text-gray-400 py-4 italic">
                No tasks found in this section. Add one below!
            </div>

        </div>

        <div class="bg-gray-50 p-5 rounded border border-gray-200 mt-4 shadow-inner">
            <h3 class="font-semibold text-gray-700 mb-3">Add a New Task</h3>

            <form th:action="@{/tasks/section/{sectionId}/add(sectionId=${section.id})}" method="POST" class="flex flex-col gap-3">
                <input type="text" name="title" placeholder="Task Title" required
                       class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-400 focus:outline-none">

                <textarea name="description" placeholder="Short Description (Optional)" rows="2"
                          class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-400 focus:outline-none"></textarea>

                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-200 self-start">
                    Add Task
                </button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
