<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' - Details'">Line Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for Kanban board - Railroad style */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #d6d3d1;
            border-top: 2px solid #333333;
            border-bottom: 2px solid #333333;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 10px, #a8a29e 10px, #a8a29e 12px);
        }
        ::-webkit-scrollbar-thumb {
            background: #FFC300;
            border: 2px solid #333333;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF5733;
        }
        .rail-track {
            background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, #333333 15px, #333333 20px);
        }
        /* Heavy Industrial Caution Tape using Junction Colors */
        .caution-tape {
            background: repeating-linear-gradient(
                    -45deg,
                    #FFC300,
                    #FFC300 20px,
                    #333333 20px,
                    #333333 40px
            );
            height: 20px;
            width: 100%;
            border-top: 4px solid #333333;
            border-bottom: 4px solid #333333;
        }
    </style>
</head>
<body class="bg-stone-300 font-sans leading-normal tracking-normal h-screen flex flex-col overflow-hidden">

<nav class="bg-[#333333] border-b-8 border-[#FF5733] relative overflow-hidden flex-shrink-0">
    <div class="absolute inset-0 rail-track opacity-20 pointer-events-none border-y-4 border-[#333333] h-16 mt-0"></div>
    <div class="mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="flex justify-between h-20">
            <div class="flex items-center">
                <svg class="w-10 h-10 mr-3 text-[#FFC300]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 2v20" />
                    <path d="M17 2v20" />
                    <path d="M7 7h10" />
                    <path d="M7 12h10" />
                    <path d="M7 17h10" />
                </svg>
                <span class="text-2xl font-black text-white tracking-widest uppercase">Junc<span class="text-[#FFC300]">tion</span></span>
            </div>
            <div class="flex items-center">
                <a th:href="@{/api/dashboard}" class="inline-flex items-center px-4 py-2 border-2 border-[#333333] text-xs font-black uppercase tracking-widest text-stone-100 bg-[#333333] hover:bg-stone-700 hover:border-[#FFC300] transition-colors">
                    <svg class="w-4 h-4 mr-2 text-[#FFC300]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="square" stroke-linejoin="miter" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Yard Return
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="bg-[#FFC300] border-b-4 border-[#333333] py-6 px-6 sm:px-8 flex-shrink-0 z-10">
    <div class="flex justify-between items-start">
        <div>
            <h1 class="text-4xl font-black text-[#333333] tracking-widest uppercase flex items-center gap-3">
                <svg class="w-8 h-8 text-[#FF5733]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <span th:text="${project.title}">Line Title</span>
            </h1>
            <p class="text-[#333333] mt-2 font-mono text-sm font-bold border-l-4 border-[#FF5733] pl-3 max-w-3xl" th:text="${project.description}">Manifest goes here.</p>
        </div>
    </div>
</div>

<div class="caution-tape shadow-[0_4px_0_0_#1c1917] z-10 relative flex-shrink-0"></div>

<div class="flex-grow flex items-stretch space-x-6 overflow-x-auto p-6 sm:p-8 bg-stone-300 relative z-0 min-h-0">

    <div th:each="section : ${project.sections}" class="bg-stone-100 border-4 border-[#333333] shadow-[6px_6px_0_0_#1c1917] p-4 min-w-[320px] w-80 flex-shrink-0 flex flex-col relative group">

        <div class="absolute -left-6 top-1/2 w-6 border-y-4 border-[#333333] rail-track h-4 opacity-50 z-[-1]"></div>

        <div class="flex justify-between items-center mb-4 px-1 pb-2 border-b-4 border-[#333333] bg-[#333333] p-2 -mx-4 -mt-4 text-[#FFC300] relative flex-shrink-0">
            <h2 class="text-sm font-black uppercase tracking-widest flex items-center gap-2 w-full">
                <a th:href="@{/sections/{id}(id=${section.id})}" class="hover:text-white transition-colors truncate pl-2" th:text="${section.title}">Car Name</a>
                <span class="ml-auto bg-[#FFC300] text-[#333333] py-1 px-3 text-xs font-mono border-2 border-[#333333]" th:text="${section.tasks != null ? section.tasks.size() : '0'}">0</span>
            </h2>

            <form th:action="@{/sections/{id}/delete(id=${section.id})}" method="POST" onsubmit="return confirm('DANGER: Scrap this car and jettison all cargo inside?');" class="absolute top-[-16px] right-[-16px] opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                <button type="submit" class="bg-[#333333] text-red-500 hover:text-white hover:bg-red-600 border-2 border-[#333333] p-1.5 shadow-[2px_2px_0_0_#1c1917] active:translate-y-px active:translate-x-px active:shadow-none transition-all" title="Scrap Car">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="square" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </form>
        </div>

        <div class="space-y-4 overflow-y-auto flex-grow pr-2 pb-2 custom-scroll mt-2 min-h-0">

            <div th:each="task : ${section.tasks}" class="bg-white p-4 border-2 border-[#333333] shadow-[4px_4px_0_0_#1c1917] hover:translate-y-px hover:translate-x-px hover:shadow-[2px_2px_0_0_#1c1917] transition-all relative">

                <div class="absolute -left-1.5 top-1/2 w-3 h-4 bg-stone-100 border-r-2 border-[#333333] rounded-r-full"></div>

                <div class="flex items-start justify-between gap-3 pl-2">

                    <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="POST" class="mt-0.5">
                        <button type="submit" class="focus:outline-none w-6 h-6 border-2 border-[#333333] flex items-center justify-center bg-stone-200 hover:bg-[#FFC300] transition-colors">
                            <svg th:if="${task.completed}" class="w-4 h-4 text-[#FF5733]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                        </button>
                    </form>

                    <div class="flex-grow min-w-0">
                        <div class="flex flex-wrap gap-1 mb-1.5">
                            <span class="text-[9px] font-black uppercase tracking-widest px-1.5 border border-[#333333]"
                                  th:text="${task.cargoClass}"
                                  th:classappend="${task.cargoClass == 'HAZMAT'} ? 'bg-[#FF5733] text-white' : (${task.cargoClass == 'EXPRESS'} ? 'bg-[#FFC300] text-[#333333]' : 'bg-stone-200 text-stone-600')">
                                CLASS
                            </span>
                            <span th:if="${task.deliveryDate != null and !task.deliveryDate.empty}" class="text-[9px] font-mono text-[#333333] font-bold flex items-center">
                                <svg class="w-2.5 h-2.5 mr-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span th:text="${task.deliveryDate}">Date</span>
                            </span>
                        </div>
                        <p class="text-[#333333] font-black text-sm uppercase tracking-wide truncate"
                           th:text="${task.title}"
                           th:classappend="${task.completed} ? 'line-through text-stone-400' : ''">
                            Cargo Item
                        </p>
                        <p th:if="${task.description != null and !task.description.empty}" class="text-stone-600 font-mono text-xs mt-2 line-clamp-2 bg-stone-100 p-2 border border-[#333333]" th:text="${task.description}">Details...</p>
                    </div>

                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="POST" onsubmit="return confirm('Jettison cargo?');">
                        <button type="submit" class="text-stone-400 hover:text-[#FF5733] transition-colors p-1" title="Jettison">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="square" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </form>
                </div>
            </div>

            <div th:if="${section.tasks == null or section.tasks.empty}" class="bg-stone-200 border-2 border-dashed border-[#333333] p-6 text-center text-stone-500 text-xs font-black uppercase tracking-widest">
                Car Empty
            </div>

        </div>

        <div class="pt-4 mt-auto border-t-4 border-[#333333] flex-shrink-0">
            <a th:href="@{/sections/{id}(id=${section.id})}" class="flex items-center justify-center text-xs font-black uppercase tracking-widest text-[#333333] border-2 border-[#333333] bg-[#FFC300] hover:bg-[#FF5733] hover:text-white py-3 shadow-[4px_4px_0_0_#1c1917] active:translate-y-1 active:translate-x-1 active:shadow-none transition-all w-full">
                Inspect Cargo &rarr;
            </a>
        </div>

    </div>

    <div class="min-w-[320px] w-80 flex-shrink-0 relative flex flex-col">
        <div class="absolute -left-6 top-1/2 w-6 border-y-4 border-[#333333] rail-track h-4 opacity-50 z-[-1]"></div>

        <form th:action="@{/sections/project/{projectId}/add(projectId=${project.id})}" method="POST" class="flex-grow bg-stone-200 border-4 border-dashed border-[#333333] hover:border-[#FF5733] hover:bg-[#FFC300]/20 transition-all duration-200 p-6 flex flex-col items-center justify-center group">
            <svg class="w-8 h-8 mb-4 text-[#333333] group-hover:text-[#FF5733] transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="square" d="M12 4v16m8-8H4"></path></svg>
            <input type="text" name="title" placeholder="HITCH NEW CAR" required
                   class="w-full bg-white border-2 border-[#333333] p-3 text-center text-xs font-black uppercase tracking-widest placeholder-[#333333]/50 focus:outline-none focus:ring-4 focus:ring-[#FFC300] shadow-inner text-[#333333]">
            <button type="submit" class="hidden">Add</button>
        </form>
    </div>

</div>

<div class="caution-tape flex-shrink-0"></div>
<footer class="bg-[#333333] border-t-8 border-[#1a1a1a] py-6 flex-shrink-0">
    <div class="max-w-full mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-xs font-black uppercase tracking-[0.3em] text-stone-400">
            &copy; 2026 Junction Transit Authority | Water Valley, MS
        </div>
        <div class="flex gap-6 text-[10px] font-black uppercase tracking-widest text-[#FFC300]">
            <span>Line Status: Monitored</span>
            <span>System: v4.0.3</span>
        </div>
    </div>
</footer>

</body>
</html>
