<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junction - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans leading-normal tracking-normal min-h-screen p-8 text-[#333333]">

<div class="max-w-6xl mx-auto flex justify-between items-center mb-10 border-b-4 border-[#333333] pb-5">
    <div class="flex items-center gap-4">
        <span class="text-5xl text-[#FF5733] font-extrabold rotate-[-15deg]" style="font-family: serif;">J</span>
        <div class="w-1.5 h-10 bg-[#FFC300] rounded"></div> <h1 class="text-4xl font-black text-[#333333] tracking-tighter uppercase">Junction</h1>
        <span class="text-xs bg-[#333333] text-[#FFC300] px-2 py-0.5 rounded font-mono border border-[#333333]">SYSTEM_v1.0</span>
    </div>

    <div class="flex items-center gap-4">
        <div th:if="${param.error}" class="text-white bg-[#FF5733] px-3 py-1.5 rounded font-bold shadow-md text-sm animate-pulse">
            ⚠️ UNAUTHORIZED ACCESS
        </div>

        <a th:href="@{/users/profile}" class="bg-[#333333] hover:bg-[#FF5733] text-white font-bold py-2.5 px-6 rounded-sm shadow-[4px_4px_0px_0px_rgba(255,195,0,1)] transition duration-200 text-sm uppercase tracking-widest">
            Conductor Profile
        </a>
    </div>
</div>

<div class="max-w-6xl mx-auto bg-white p-7 rounded-lg shadow-xl border-2 border-[#333333] mb-10 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-2 bg-[#FF5733]"></div>

    <div class="flex items-center gap-3 mb-5">
        <span class="text-2xl text-[#333333]">🏗️</span>
        <h2 class="text-2xl font-black text-[#333333] uppercase tracking-tight">Dispatch New Project Route</h2>
    </div>

    <form th:action="@{/api/dashboard/add}" method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-5">
        <div class="relative">
            <input type="text" name="title" placeholder="Project Title" required
                   class="w-full border-2 border-slate-200 p-3 pl-10 rounded bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FFC300] focus:border-[#333333] text-slate-800 transition-colors font-bold">
            <span class="absolute left-3 top-1/2 -translate-y-1/2">🏷️</span>
        </div>

        <input type="text" name="description" placeholder="Project Specs / Details"
               class="border-2 border-slate-200 p-3 rounded bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FFC300] focus:border-[#333333] text-slate-800 transition-colors">

        <div class="relative">
            <input type="text" name="sectionTitle" placeholder="Initial Track" required
                   class="w-full border-2 border-slate-200 p-3 pl-10 rounded bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FFC300] focus:border-[#333333] text-slate-800 transition-colors font-mono">
            <span class="absolute left-3 top-1/2 -translate-y-1/2">🛤️</span>
        </div>

        <button type="submit"
                class="bg-[#FF5733] hover:bg-[#333333] text-white font-black py-3 px-6 rounded shadow-md transition duration-200 flex justify-center items-center gap-2 group text-lg uppercase">
            Create Route
            <span class="group-hover:translate-x-1 transition-transform">➕</span>
        </button>
    </form>
</div>

<div class="max-w-6xl mx-auto bg-white rounded-lg shadow-2xl border-2 border-[#333333] overflow-hidden">
    <div class="p-6 border-b-2 border-[#333333] bg-[#FFC300]">
        <h3 class="text-xl font-black text-[#333333] uppercase">Active Mainlines</h3>
    </div>

    <table class="min-w-full bg-white">
        <thead class="bg-[#333333] text-[#FFC300]">
        <tr>
            <th class="py-4 px-6 text-left uppercase font-black text-xs tracking-[0.2em]">Operational Route</th>
            <th class="py-4 px-6 text-left uppercase font-black text-xs tracking-[0.2em]">Switch (Actions)</th>
        </tr>
        </thead>

        <tbody class="text-[#333333]">
        <tr th:if="${projects.empty}">
            <td colspan="3" class="py-12 text-center bg-slate-50 text-slate-500 italic">
                All lines are clear. No active routes detected.
            </td>
        </tr>

        <tr th:each="project : ${projects}" class="border-b border-slate-200 hover:bg-[#FFC300]/10 transition-colors duration-150">

            <td class="py-5 px-6">
                <a th:href="@{/api/dashboard/project/{id}(id=${project.id})}"
                   class="font-black text-[#FF5733] hover:text-[#333333] text-2xl block mb-1 uppercase tracking-tight"
                   th:text="${project.title}">
                    Project Alpha
                </a>
                <p class="text-sm font-semibold text-slate-600 mb-4" th:text="${project.description}">Details...</p>

                <div class="flex items-center max-w-sm gap-4 bg-[#333333] p-2 rounded border-2 border-[#333333] shadow-inner">
                    <div class="w-full bg-slate-600 rounded-sm h-3 relative overflow-hidden">
                        <div class="bg-[#FF5733] h-full transition-all duration-700 ease-out"
                             th:style="'width: ' + ${project.completionPercentage} + '%'">
                        </div>
                    </div>
                    <span class="text-xs font-black text-[#FFC300] w-12 text-right font-mono"
                          th:text="${project.completionPercentage} + '%'">0%</span>
                </div>
            </td>

            <td class="py-5 px-6 align-middle">
                <form th:action="@{/api/dashboard/{project_id}/delete(project_id=${project.id})}" method="POST">
                    <button type="submit" class="text-[#333333] hover:text-white font-black bg-slate-100 hover:bg-rose-600 py-3 px-5 rounded border-2 border-[#333333] transition duration-150 text-xs uppercase tracking-tighter">
                        Decommission Line
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
