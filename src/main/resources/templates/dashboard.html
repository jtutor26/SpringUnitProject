<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Junction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rail-track {
            background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, #292524 15px, #292524 20px);
        }
    </style>
</head>
<body class="bg-stone-300 font-sans leading-normal tracking-normal min-h-screen flex flex-col">

    <!-- Industrial Navbar -->
    <nav class="bg-stone-900 border-b-8 border-orange-600 relative overflow-hidden">
        <div class="absolute inset-0 rail-track opacity-20 pointer-events-none border-y-4 border-stone-900 h-16 mt-0"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <svg class="w-10 h-10 mr-3 text-orange-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 2v20" />
                        <path d="M17 2v20" />
                        <path d="M7 7h10" />
                        <path d="M7 12h10" />
                        <path d="M7 17h10" />
                    </svg>
                    <span class="text-3xl font-black text-white tracking-widest uppercase">Junc<span class="text-orange-500">tion</span></span>
                    <span class="ml-4 px-2 py-1 bg-stone-800 border-2 border-stone-700 text-stone-300 text-xs font-mono tracking-widest hidden sm:inline-block">MAIN YARD</span>
                </div>
                <div class="flex items-center gap-4">
                    <div th:if="${param.error}" class="text-white font-black text-xs uppercase tracking-wider bg-red-600 border-2 border-white px-3 py-1 shadow-[2px_2px_0_0_#fff]">
                        Restricted Area
                    </div>
                    <a th:href="@{/users/profile}" class="inline-flex items-center px-4 py-2 border-2 border-stone-700 text-xs font-black uppercase tracking-widest text-stone-100 bg-stone-800 hover:bg-stone-700 hover:border-orange-500 transition-colors">
                        Operator Profile
                    </a>
                    <form th:action="@{/logout}" method="post" class="inline">
                        <button type="submit" class="px-4 py-2 border-2 border-transparent text-xs font-black uppercase tracking-widest text-orange-500 hover:text-white hover:bg-stone-800 transition-colors">Depart</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full flex-grow">
        
        <div class="flex justify-between items-center mb-8 border-b-4 border-stone-900 pb-4">
            <h1 class="text-4xl font-black text-stone-900 uppercase tracking-widest">Freight Yard</h1>
        </div>

        <!-- Add Project Module -->
        <div class="bg-stone-200 p-6 md:p-8 border-4 border-stone-900 shadow-[8px_8px_0_0_#1c1917] mb-12 relative">
            <div class="absolute top-0 right-0 w-8 h-8 border-b-4 border-l-4 border-stone-900"></div>
            <div class="absolute bottom-0 left-0 w-8 h-8 border-t-4 border-r-4 border-stone-900"></div>
            
            <h2 class="text-xl font-black mb-5 text-stone-900 uppercase tracking-wider flex items-center">
                <svg class="w-6 h-6 mr-3 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="square" stroke-linejoin="miter" d="M12 4v16m8-8H4"></path></svg>
                Deploy New Engine
            </h2>

            <form th:action="@{/api/dashboard/add}" method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" name="title" placeholder="Engine Designation" required
                       class="border-2 border-stone-900 p-3 bg-white font-mono text-stone-900 focus:outline-none focus:ring-4 focus:ring-orange-500 uppercase placeholder:normal-case placeholder:text-stone-400 shadow-inner">

                <input type="text" name="description" placeholder="Manifest Details"
                       class="border-2 border-stone-900 p-3 bg-white font-mono text-stone-900 focus:outline-none focus:ring-4 focus:ring-orange-500 uppercase placeholder:normal-case placeholder:text-stone-400 shadow-inner">

                <input type="text" name="sectionTitle" placeholder="First Car (e.g. 'Cargo')" required
                       class="border-2 border-stone-900 p-3 bg-white font-mono text-stone-900 focus:outline-none focus:ring-4 focus:ring-orange-500 uppercase placeholder:normal-case placeholder:text-stone-400 shadow-inner">

                <button type="submit"
                        class="bg-orange-500 hover:bg-orange-400 text-stone-900 font-black uppercase tracking-widest py-3 px-6 border-2 border-stone-900 shadow-[4px_4px_0_0_#1c1917] transition-all active:translate-y-1 active:translate-x-1 active:shadow-none flex justify-center items-center">
                    Construct
                </button>
            </form>
        </div>

        <h2 class="text-2xl font-black text-stone-900 uppercase tracking-widest mb-6">Active Lines</h2>

        <div th:if="${projects.empty}" class="bg-stone-200 border-4 border-dashed border-stone-500 p-16 text-center text-stone-500 mb-8 uppercase font-bold tracking-widest">
            <svg class="w-20 h-20 mx-auto text-stone-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="square" stroke-linejoin="miter" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            Yard is empty. Deploy an engine.
        </div>

        <div th:unless="${projects.empty}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-8">
            <!-- Project Card -->
            <div th:each="project : ${projects}" class="bg-stone-100 border-4 border-stone-900 shadow-[6px_6px_0_0_#1c1917] flex flex-col group relative overflow-hidden">
                
                <div class="absolute left-0 top-0 bottom-0 w-2 bg-stone-900"></div>

                <div class="p-6 pl-8 flex-grow border-b-4 border-stone-900">
                    <div class="flex justify-between items-start mb-3">
                        <a th:href="@{/api/dashboard/project/{id}(id=${project.id})}"
                           class="text-2xl font-black text-stone-900 group-hover:text-orange-600 transition-colors block uppercase tracking-widest truncate"
                           th:text="${project.title}">
                            Line Alpha
                        </a>
                        <form th:action="@{/api/dashboard/{project_id}/delete(project_id=${project.id})}" method="POST" onsubmit="return confirm('Dismantle this line?');" class="ml-2">
                            <button type="submit" class="text-stone-500 hover:text-red-600 transition-colors p-1 bg-stone-200 border-2 border-stone-900 hover:bg-red-100" title="Dismantle">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="square" stroke-linejoin="miter" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </form>
                    </div>

                    <p class="text-stone-700 font-mono text-sm mb-4 line-clamp-2" th:text="${project.description}">Manifest details</p>
                </div>
                
                <div class="px-6 pl-8 py-4 bg-stone-800 text-stone-200">
                    <div class="flex items-center justify-between mb-2">
                        <div class="text-xs font-black uppercase tracking-widest">Journey Progress</div>
                        <span class="text-xs font-black text-orange-500 tracking-widest"
                              th:text="${project.completionPercentage} + '%'">0%
                        </span>
                    </div>
                    <div class="w-full bg-stone-900 border-2 border-stone-700 h-4 relative overflow-hidden">
                        <div class="bg-orange-500 h-full transition-all duration-500 ease-in-out border-r-2 border-orange-700"
                             th:style="'width: ' + ${project.completionPercentage} + '%'">
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-stone-900 border-t-8 border-stone-800 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs font-black uppercase tracking-widest text-stone-500">
            &copy; 2026 Junction Transit Authority
        </div>
    </footer>

</body>
</html>
