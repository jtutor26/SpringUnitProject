<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Junction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rail-track {
            background-image: repeating-linear-gradient(0deg, transparent, transparent 15px, #292524 15px, #292524 20px);
        }
    </style>
</head>
<body class="bg-stone-300 min-h-screen flex items-center justify-center font-sans relative overflow-hidden py-12 px-4 sm:px-6 lg:px-8">

    <!-- Railroad background decoration -->
    <div class="absolute inset-0 z-0 flex justify-center opacity-20 pointer-events-none">
        <div class="w-20 h-full border-x-8 border-stone-900 rail-track"></div>
        <div class="w-64 h-full"></div>
        <div class="w-20 h-full border-x-8 border-stone-900 rail-track"></div>
    </div>

<div class="bg-stone-100 p-8 md:p-10 border-4 border-stone-900 shadow-[8px_8px_0px_0px_rgba(28,25,23,1)] w-full max-w-md relative z-10">
    <div class="text-center mb-8 border-b-4 border-dashed border-stone-400 pb-6">
        <div class="flex justify-center mb-4">
            <svg class="w-16 h-16 text-orange-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 2v20" />
                <path d="M17 2v20" />
                <path d="M7 7h10" />
                <path d="M7 12h10" />
                <path d="M7 17h10" />
            </svg>
        </div>
        <h2 class="text-4xl font-black text-stone-900 uppercase tracking-widest">Junc<span class="text-orange-600">tion</span></h2>
        <p class="text-stone-600 mt-2 font-bold uppercase text-xs tracking-wider">Issue New Ticket</p>
    </div>

    <div th:if="${errorMessage}" class="bg-red-500 border-2 border-stone-900 text-white p-4 mb-6 font-bold shadow-[4px_4px_0_0_#1c1917]" role="alert">
        <p class="uppercase tracking-wide text-xs">Error Issuing Ticket</p>
        <p class="text-sm" th:text="${errorMessage}">Error message</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="POST" class="space-y-5">
        <div>
            <label for="username" class="block text-xs font-black uppercase tracking-widest text-stone-800 mb-2">Operator ID</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Choose an ID" required
                   class="w-full px-4 py-3 border-2 border-stone-900 focus:outline-none focus:ring-4 focus:ring-orange-500 bg-white font-mono text-stone-900 shadow-inner">
        </div>

        <div>
            <label for="email" class="block text-xs font-black uppercase tracking-widest text-stone-800 mb-2">Email Dispatch</label>
            <input type="email" id="email" th:field="*{email}" placeholder="you@station.com" required
                   class="w-full px-4 py-3 border-2 border-stone-900 focus:outline-none focus:ring-4 focus:ring-orange-500 bg-white font-mono text-stone-900 shadow-inner">
        </div>

        <div>
            <label for="password" class="block text-xs font-black uppercase tracking-widest text-stone-800 mb-2">Passcode</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Create passcode" required
                   class="w-full px-4 py-3 border-2 border-stone-900 focus:outline-none focus:ring-4 focus:ring-orange-500 bg-white font-mono text-stone-900 shadow-inner">
        </div>

        <button type="submit"
                class="w-full flex justify-center py-4 border-2 border-stone-900 shadow-[4px_4px_0_0_#1c1917] text-sm font-black uppercase tracking-widest text-stone-900 bg-orange-500 hover:bg-orange-400 active:translate-y-1 active:translate-x-1 active:shadow-none transition-all mt-6">
            Generate Ticket
        </button>
    </form>

    <div class="mt-8 text-center pt-6 border-t-4 border-dashed border-stone-400">
        <p class="text-xs font-bold text-stone-600 uppercase tracking-wide">
            Already have a ticket? 
            <a th:href="@{/login}" class="font-black text-orange-600 hover:text-orange-700 underline decoration-2 underline-offset-4">Board here</a>
        </p>
    </div>
</div>

</body>
</html>
