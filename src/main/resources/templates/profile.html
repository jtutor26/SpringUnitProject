<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Profile - Junction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .rail-track {
            background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, #292524 15px, #292524 20px);
        }
    </style>
</head>
<body class="bg-stone-300 font-sans leading-normal tracking-normal min-h-screen flex flex-col">

    <!-- Industrial Navbar -->
    <nav class="bg-stone-900 border-b-8 border-orange-600 relative overflow-hidden">
        <div class="absolute inset-0 rail-track opacity-20 pointer-events-none border-y-4 border-stone-900 h-16 mt-0"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="flex justify-between h-20">
                <div class="flex items-center">
                    <svg class="w-10 h-10 mr-3 text-orange-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 2v20" />
                        <path d="M17 2v20" />
                        <path d="M7 7h10" />
                        <path d="M7 12h10" />
                        <path d="M7 17h10" />
                    </svg>
                    <span class="text-3xl font-black text-white tracking-widest uppercase">Junc<span class="text-orange-500">tion</span></span>
                </div>
                <div class="flex items-center">
                     <a th:href="@{/api/dashboard}" class="inline-flex items-center px-4 py-2 border-2 border-stone-700 text-xs font-black uppercase tracking-widest text-stone-100 bg-stone-800 hover:bg-stone-700 hover:border-orange-500 transition-colors">
                        &larr; Return to Yard
                    </a>
                </div>
            </div>
        </div>
    </nav>

<div class="container mx-auto p-4 sm:p-8 max-w-2xl py-12 flex-grow">

    <div class="flex justify-between items-center mb-8 border-b-4 border-stone-900 pb-4">
        <h1 class="text-4xl font-black text-stone-900 uppercase tracking-widest">Operator File</h1>
    </div>

    <div th:if="${param.success}" class="bg-orange-500 border-4 border-stone-900 text-stone-900 px-4 py-4 shadow-[4px_4px_0_0_#1c1917] mb-8 flex items-center font-black uppercase tracking-widest">
        <svg class="w-6 h-6 mr-3 text-stone-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="square" stroke-linejoin="miter" d="M5 13l4 4L19 7"></path></svg>
        <span>Manifest Updated Successfully!</span>
    </div>

    <div class="bg-stone-100 p-6 sm:p-8 border-4 border-stone-900 shadow-[8px_8px_0_0_#1c1917] mb-10">
        <h2 class="text-xl font-black text-stone-900 mb-6 uppercase tracking-wider border-b-2 border-dashed border-stone-400 pb-3 flex items-center">
            <svg class="w-6 h-6 mr-3 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="square" stroke-linejoin="miter" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            Update Credentials
        </h2>

        <form th:action="@{/users/profile/update}" th:object="${userDto}" method="POST" class="space-y-6">

            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-stone-800 mb-2">Operator ID</label>
                <input type="text" th:field="*{username}" required
                       class="w-full border-2 border-stone-900 p-3 focus:outline-none focus:ring-4 focus:ring-orange-500 font-mono text-stone-900 shadow-inner bg-white">
            </div>

            <div>
                <label class="block text-xs font-black uppercase tracking-widest text-stone-800 mb-2">Dispatch Email</label>
                <input type="email" th:field="*{email}" required
                       class="w-full border-2 border-stone-900 p-3 focus:outline-none focus:ring-4 focus:ring-orange-500 font-mono text-stone-900 shadow-inner bg-white">
            </div>

            <div class="pt-6 border-t-2 border-stone-900 mt-6 bg-stone-200 p-4 border-2">
                <label class="block text-xs font-black uppercase tracking-widest text-stone-800 mb-1">Verify Identity</label>
                <p class="text-xs font-mono text-stone-600 mb-3">Provide passcode to authorize modifications.</p>
                <input type="password" th:field="*{password}" required placeholder="Passcode required"
                       class="w-full border-2 border-stone-900 p-3 focus:outline-none focus:ring-4 focus:ring-orange-500 font-mono text-stone-900 shadow-inner bg-white">
            </div>

            <button type="submit" class="mt-6 w-full flex justify-center py-4 border-2 border-stone-900 shadow-[4px_4px_0_0_#1c1917] text-sm font-black uppercase tracking-widest text-stone-900 bg-orange-500 hover:bg-orange-400 active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                Save Adjustments
            </button>
        </form>
    </div>

    <div class="bg-red-600 p-6 sm:p-8 border-4 border-stone-900 shadow-[8px_8px_0_0_#1c1917]">
        <h2 class="text-xl font-black text-white mb-2 uppercase tracking-wider flex items-center">
            <svg class="w-6 h-6 mr-3 text-stone-900" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path stroke-linecap="square" stroke-linejoin="miter" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            Danger: Terminal Dismantle
        </h2>
        <p class="text-red-100 mb-6 font-mono text-sm border-b-2 border-red-800 pb-4">Warning: Executing this command will permanently scrap your operator file and all assigned lines. Irreversible action.</p>

        <form th:action="@{/users/profile/delete}" method="POST" onsubmit="return confirm('DANGER: Are you absolutely sure you want to scrub your Operator ID from the system?');">
            <button type="submit" class="bg-stone-900 hover:bg-stone-800 text-red-500 font-black uppercase tracking-widest py-4 px-6 border-2 border-stone-900 shadow-[4px_4px_0_0_#450a0a] active:translate-y-1 active:translate-x-1 active:shadow-none transition-all w-full sm:w-auto">
                Terminate Record
            </button>
        </form>
    </div>

</div>

</body>
</html>
